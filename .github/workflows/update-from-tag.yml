name: update formula when release

on:
  push:
    branches:
      - 'v*'

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION_WITH_V="${{ github.ref_name }}"
          VERSION=${VERSION_WITH_V#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_with_v=$VERSION_WITH_V" >> "$GITHUB_OUTPUT"

      - name: Download release files and compute checksums
        id: checksums
        run: |
          VERSION_WITH_V="${{ github.ref_name }}"
          VERSION="${VERSION_WITH_V#v}"
          
          # Download x86_64 (ns-sandbox-v0.0.2-x86_64-apple-darwin.tar.gz)
          X86_64_FILE="ns-sandbox-$VERSION_WITH_V-x86_64-apple-darwin.tar.gz"
          wget -O "$X86_64_FILE" "https://github.com/navysummer/ns-sandbox/releases/download/$VERSION_WITH_V/$X86_64_FILE"
          X86_64_CHECKSUM=$(sha256sum "$X86_64_FILE" | cut -d ' ' -f 1)
          
          # Download arm64 (ns-sandbox-v0.0.2-aarch64-apple-darwin.tar.gz)
          ARM64_FILE="ns-sandbox-$VERSION_WITH_V-aarch64-apple-darwin.tar.gz"
          wget -O "$ARM64_FILE" "https://github.com/navysummer/ns-sandbox/releases/download/$VERSION_WITH_V/$ARM64_FILE"
          ARM64_CHECKSUM=$(sha256sum "$ARM64_FILE" | cut -d ' ' -f 1)
          
          echo "sha256_x86_64=$X86_64_CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=$ARM64_CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update sha256 checksums
        run: |
          FILE="Formula/ns-sandbox.rb"
          
          # Get computed checksums
          X86_64_CHECKSUM="${{ steps.checksums.outputs.sha256_x86_64 }}"
          ARM64_CHECKSUM="${{ steps.checksums.outputs.sha256_arm64 }}"
          
          # Update x86_64 sha256: locate the block containing 'x86_64-apple-darwin' and replace sha256
          sed -i "/x86_64-apple-darwin/,/sha256/s/sha256 \".*\"/sha256 \"$X86_64_CHECKSUM\"/" "$FILE"
          
          # Update arm64 sha256: locate the block containing 'aarch64-apple-darwin' and replace sha256
          sed -i "/aarch64-apple-darwin/,/sha256/s/sha256 \".*\"/sha256 \"$ARM64_CHECKSUM\"/" "$FILE"

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Pull latest main, then commit and push
          git pull --rebase origin main
          
          git add Formula/ns-sandbox.rb
          git commit -m "Update formula.rb to version ${{ github.ref_name }}" || true
          
          git push