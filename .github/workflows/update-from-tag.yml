name: update formula when release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download macOS Intel (x86_64) and compute sha256
        id: sha256_x86_64
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}
          URL="https://github.com/navysummer/ns-sandbox/releases/download/$VERSION/ns-sandbox-$VERSION-x86_64.tar.gz"
          wget -O "ns-sandbox-$VERSION-x86_64.tar.gz" "$URL"
          SHA256=$(sha256sum "ns-sandbox-$VERSION-x86_64.tar.gz" | cut -d ' ' -f 1)
          echo "sha256_x86_64=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Download macOS Arm (arm64) and compute sha256
        id: sha256_arm64
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}
          URL="https://github.com/navysummer/ns-sandbox/releases/download/$VERSION/ns-sandbox-$VERSION-arm64.tar.gz"
          wget -O "ns-sandbox-$VERSION-arm64.tar.gz" "$URL"
          SHA256=$(sha256sum "ns-sandbox-$VERSION-arm64.tar.gz" | cut -d ' ' -f 1)
          echo "sha256_arm64=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula.rb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}
          FILE="Formula/ns-sandbox.rb"
          
          # Update version number
          sed -i "s/version \"0\.0\\.1\"/version \"$VERSION\"/g" "$FILE"
          
          # Update x86_64 sha256
          sed -i "s/sha256 \"9c37892e94909f6bd39a79fd3bc4f785b31be9d1bc3691bc23ba06ab7a6beb96\"/sha256 \"${{ steps.sha256_x86_64.outputs.sha256_x86_64 }}\"/g" "$FILE"
          
          # Update arm64 sha256
          sed -i "s/sha256 \"5a31dafa76824e5725751793317e2b9a8643b2760eb656c8e6d9e1e5b8715222\"/sha256 \"${{ steps.sha256_arm64.outputs.sha256_arm64 }}\"/g" "$FILE"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add Formula/ns-sandbox.rb
          git commit -m "Update formula.rb to version ${{ steps.get_version.outputs.version }}" || exit 0
          
          git push