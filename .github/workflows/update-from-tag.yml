name: update formula when release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION_WITH_V="${{ github.ref_name }}"
          VERSION=${VERSION_WITH_V#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_with_v=$VERSION_WITH_V" >> "$GITHUB_OUTPUT"

      - name: Download macOS Intel (x86_64) and compute sha256
        id: sha256_x86_64
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          VERSION_WITH_V="${{ steps.get_version.outputs.version_with_v }}"
          URL="https://github.com/navysummer/ns-sandbox/releases/download/$VERSION_WITH_V/ns-sandbox-$VERSION_WITH_V-x86_64-apple-darwin.tar.gz"
          wget -O "ns-sandbox-$VERSION_WITH_V-x86_64-apple-darwin.tar.gz" "$URL"
          SHA256=$(sha256sum "ns-sandbox-$VERSION_WITH_V-x86_64-apple-darwin.tar.gz" | cut -d ' ' -f 1)
          echo "sha256_x86_64=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Download macOS Arm (arm64) and compute sha256
        id: sha256_arm64
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          VERSION_WITH_V="${{ steps.get_version.outputs.version_with_v }}"
          URL="https://github.com/navysummer/ns-sandbox/releases/download/$VERSION_WITH_V/ns-sandbox-$VERSION_WITH_V-aarch64-apple-darwin.tar.gz"
          wget -O "ns-sandbox-$VERSION_WITH_V-aarch64-apple-darwin.tar.gz" "$URL"
          SHA256=$(sha256sum "ns-sandbox-$VERSION_WITH_V-aarch64-apple-darwin.tar.gz" | cut -d ' ' -f 1)
          echo "sha256_arm64=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula.rb with new version and checksums
        run: |
          FILE="Formula/ns-sandbox.rb"
          
          # Get computed checksums for replacement
          X86_64_CHECKSUM="${{ steps.sha256_x86_64.outputs.sha256_x86_64 }}"
          ARM64_CHECKSUM="${{ steps.sha256_arm64.outputs.sha256_arm64 }}"
          
          # Get current version
          VERSION="${{ steps.get_version.outputs.version }}"
          
          # Update version number (0.0.1 → current version)
          sed -i "s/version \"0\.0\\.1\"/version \"$VERSION\"/g" "$FILE"
          
          # Update x86_64 sha256 (previous hardcoded sha256 → computed sha256)
          sed -i "s|sha256 \"9c37892e94909f6bd39a79fd3bc4f785b31be9d1bc3691bc23ba06ab7a6beb96\"|sha256 \"$X86_64_CHECKSUM\"|" "$FILE"
          
          # Update arm64 sha256 (previous hardcoded sha256 → computed sha256)
          sed -i "s|sha256 \"5a31dafa76824e5725751793317e2b9a8643b2760eb656c8e6d9e1e5b8715222\"|sha256 \"$ARM64_CHECKSUM\"|" "$FILE"

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Create a branch for the changes
          BRANCH_NAME="update-to-version-${{ steps.get_version.outputs.version }}"
          git checkout -B "$BRANCH_NAME"
          
          git add Formula/ns-sandbox.rb
          git commit -m "Update formula.rb to version ${{ steps.get_version.outputs.version }}" || exit 0
          
          git push -u origin "$BRANCH_NAME"
